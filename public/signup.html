<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/img/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up Grassion</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d1b2a;--navy-2:#112236;--teal:#2a9fd6;--teal-2:#1e8ab8;--teal-light:#e8f6fd;--off-white:#f0f4f8;--text:#0d1b2a;--text-mid:#4a6075;--text-light:#7a95aa;--border:rgba(13,27,42,0.1);--shadow-teal:0 8px 32px rgba(42,159,214,0.15)}
html,body{height:100%;cursor:none;-webkit-font-smoothing:antialiased;font-family:'Satoshi',sans-serif;background:var(--off-white);color:var(--text);overflow-x:hidden}
.cursor-dot{width:8px;height:8px;background:var(--teal);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;}
.cursor-trail{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;transform:translate(-50%,-50%)}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.5}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 24px 60px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:48px;align-self:flex-start}
.brand img{height:26px}
.auth-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(24px);border:1.5px solid rgba(255,255,255,0.9);border-radius:22px;padding:44px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(13,27,42,0.1),0 0 0 1px rgba(42,159,214,0.08);animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.auth-title{font-family:'Clash Display',sans-serif;font-size:26px;font-weight:700;color:var(--navy);margin-bottom:6px;letter-spacing:-0.5px}
.auth-sub{font-size:14px;color:var(--text-mid);margin-bottom:28px}
.github-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:var(--navy-2);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Satoshi',sans-serif;text-decoration:none;transition:all 0.25s}
.github-btn:hover{background:var(--navy);transform:translateY(-1px);box-shadow:0 8px 24px rgba(13,27,42,0.25)}
.github-btn svg{width:18px;height:18px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-light);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--navy);margin-bottom:5px}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Satoshi',sans-serif;outline:none;transition:all 0.2s;background:rgba(255,255,255,0.8);color:var(--navy)}
.form-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,159,214,0.08);background:#fff}
.form-input::placeholder{color:var(--text-light)}
.submit-btn{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Satoshi',sans-serif;transition:all 0.25s;margin-top:6px}
.submit-btn:hover{background:var(--teal-2);transform:translateY(-1px);box-shadow:var(--shadow-teal)}
.auth-footer{margin-top:20px;text-align:center;font-size:14px;color:var(--text-mid)}
.auth-footer a{color:var(--teal);text-decoration:none;font-weight:500}
.terms{font-size:12px;color:var(--text-light);text-align:center;margin-top:16px;line-height:1.5}
.error-msg{background:#fef2f2;border:1px solid #fee2e2;color:#dc2626;border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:14px;display:none}
.float-el{position:fixed;pointer-events:none;z-index:0}
.f1{top:15%;right:8%;width:120px;height:120px;background:rgba(42,159,214,0.06);border:1px solid rgba(42,159,214,0.12);border-radius:20px;transform:rotate(15deg);animation:flt 10s ease-in-out infinite}
.f2{bottom:20%;left:5%;width:80px;height:80px;background:rgba(255,255,255,0.5);border:1px solid rgba(42,159,214,0.1);border-radius:50%;animation:flt2 12s ease-in-out infinite}
@keyframes flt{0%,100%{transform:rotate(15deg) translateY(0)}50%{transform:rotate(15deg) translateY(-16px)}}
@keyframes flt2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="float-el f1"></div>
<div class="float-el f2"></div>
<div class="page">
  <a href="/" class="brand"><img src="/img/logo.png" alt="Grassion" style="height:26px"></a>
  <div class="auth-card">
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Start protecting your codebase in 30 seconds.</div>
    <div id="errorMsg" class="error-msg"></div>
    <a href="/auth/github" class="github-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Continue with GitHub
    </a>
    <div class="divider">or sign up with email</div>
    <div class="form-group"><label>Full name <span style="color:var(--teal)">*</span></label><input type="text" class="form-input" id="name" placeholder="Sai Snata Dash"></div>
    <div class="form-group"><label>Email <span style="color:var(--teal)">*</span></label><input type="email" class="form-input" id="email" placeholder="you@company.com"></div>
    <div class="form-group"><label>Password <span style="color:var(--teal)">*</span></label><input type="password" class="form-input" id="password" placeholder="Min 8 characters"></div>
    <div class="form-group"><label>Company <span style="color:var(--text-light);font-weight:400">(optional)</span></label><input type="text" class="form-input" id="company" placeholder="Your startup or company"></div>
    <button class="submit-btn" onclick="handleSignup()">Create account</button>
    <div class="auth-footer">Already have an account? <a href="/signin">Sign in</a></div>
    <div class="terms">By creating an account you agree to our Terms and Privacy Policy.</div>
  </div>
</div>
<script>
(function(){
var _cd=document.createElement('div');_cd.className='cursor-dot';document.body.appendChild(_cd);
var _tr=[];for(var _i=0;_i<12;_i++){var _t=document.createElement('div');_t.className='cursor-trail';var _sz=Math.max(4,16-_i);_t.style.cssText='width:'+_sz+'px;height:'+_sz+'px;background:hsla('+(180+_i*8)+',80%,60%,'+(0.8-_i*0.06)+');';document.body.appendChild(_t);_tr.push({el:_t,x:0,y:0});}
var _mx=0,_my=0;
document.addEventListener('mousemove',function(e){_mx=e.clientX;_my=e.clientY;_cd.style.left=(_mx-4)+'px';_cd.style.top=(_my-4)+'px';});
(function _a(){var px=_mx,py=_my;for(var i=0;i<_tr.length;i++){var tr=_tr[i],sp=0.12+i*0.02;tr.x+=(px-tr.x)*sp;tr.y+=(py-tr.y)*sp;tr.el.style.left=tr.x+'px';tr.el.style.top=tr.y+'px';px=tr.x;py=tr.y;}requestAnimationFrame(_a);})();
var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d'),W,H,ps=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
for(var i=0;i<50;i++)ps.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.5+.5,a:Math.random()*.2+.04});
function draw(){ctx.clearRect(0,0,W,H);ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(42,159,214,'+p.a+')';ctx.fill();});requestAnimationFrame(draw);}
draw();
fetch('/auth/me').then(function(r){return r.json();}).then(function(d){if(d.user)window.location.href='/dashboard';});
window.handleSignup=function(){
  var email=document.getElementById('email').value;
  var password=document.getElementById('password').value;
  var err=document.getElementById('errorMsg');
  if(!email||!password){err.textContent='Please fill in all required fields.';err.style.display='block';return;}
  if(password.length<8){err.textContent='Password must be at least 8 characters.';err.style.display='block';return;}
  window.location.href='/auth/github';
};
})();
</script>
</body>
</html>
