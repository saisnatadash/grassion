<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Grassion</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
    .num{font-family:'Syne',sans-serif;font-size:120px;font-weight:800;color:#2563eb;line-height:1;opacity:0.15}
    h1{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;margin:-20px 0 16px}
    p{font-size:17px;color:#64748b;margin-bottom:32px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;background:#2563eb;color:#fff;border:none;font-family:'DM Sans',sans-serif}
  </style>
</head>
<body>
  <div class="num">404</div>
  <h1>Page not found.</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn">← Back to Grassion</a>
</body>
</html>
