<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" fill="none">
  <!-- Orbital ring -->
  <circle cx="45" cy="45" r="38" stroke="white" stroke-width="1.4" fill="none"/>
  <!-- Upper-left dot (~130° from positive x-axis) -->
  <!-- x=45+38*cos(130°)≈21, y=45-38*sin(130°)≈16 -->
  <circle cx="21" cy="16" r="7" fill="white"/>
  <!-- Lower-right dot (~310° from positive x-axis) -->
  <!-- x=45+38*cos(-50°)≈69, y=45-38*sin(-50°)≈74 -->
  <circle cx="69" cy="74" r="5.5" fill="white"/>
  <!-- Hebrew characters — top row: לה (lamed heh) -->
  <text x="55" y="40" font-family="Georgia,'Times New Roman',serif" font-size="17" fill="white" text-anchor="middle">לה</text>
  <!-- Hebrew characters — bottom row: חמ (chet mem) -->
  <text x="42" y="63" font-family="Georgia,'Times New Roman',serif" font-size="17" fill="white" text-anchor="middle">חמ</text>
</svg>
