<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- INSTANT AUTH GUARD - prevents login page flash -->
  <script>if(!localStorage.getItem("token")){document.documentElement.style.display="none";window.location.replace("login.html");}<\/script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Grassion</title>
  <link rel="icon" type="image/png" href="img/logo-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#1a2b3c;--navy-mid:#243447;--teal:#2a7fa5;--tl:#3a9bc4;--w:#fff;--off:#f4f7fa;--border:rgba(42,127,165,0.15);--muted:#6b8099;--font:'Inter',sans-serif;--sw:220px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{font-family:var(--font);background:var(--off);color:var(--navy);display:flex;min-height:100vh;overflow-x:hidden;overflow-y:auto;}
    .sidebar{width:var(--sw);background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;}
    .slogo{padding:22px 18px 18px;border-bottom:1px solid var(--border);}
    .slogo img{height:28px;}
    .snav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;}
    .ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;transition:background .15s,color .15s;}
    .ni svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}
    .ni:hover{background:var(--off);color:var(--navy);}
    .ni.active{background:rgba(42,127,165,.1);color:var(--teal);}
    .sbottom{padding:14px 10px;border-top:1px solid var(--border);}
    .ucard{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:9px;padding:14px;color:white;}
    .ucard p{font-size:11px;opacity:.6;margin-bottom:3px;}
    .ucard strong{font-size:12px;font-weight:600;display:block;margin-bottom:10px;}
    .ubtn{display:block;text-align:center;padding:7px;background:var(--teal);color:white;border-radius:5px;font-size:11px;font-weight:600;text-decoration:none;}
    .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-y:auto;}
    .topbar{background:white;border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
    .ptitle{font-size:15px;font-weight:700;}
    .tright{display:flex;align-items:center;gap:14px;}
    .pbadge{padding:3px 9px;background:var(--off);border:1px solid var(--border);border-radius:100px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
    .uname{font-size:13px;font-weight:500;}
    .so{font-size:12px;color:var(--muted);text-decoration:none;}
    .content{padding:28px;flex:1;}
    h1{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.02em;}
    .sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
    .section-card{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;}
    .section-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .section-head h2{font-size:14px;font-weight:700;}
    .section-head p{font-size:12px;color:var(--muted);margin-top:2px;}
    .notif-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
    .notif-row:last-child{border-bottom:none;}
    .notif-label{font-size:13px;font-weight:500;}
    .notif-desc{font-size:11px;color:var(--muted);margin-top:2px;}
    /* Toggle switch */
    .toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#dde3ea;border-radius:22px;transition:.3s;}
    .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
    input:checked+.slider{background:var(--teal);}
    input:checked+.slider:before{transform:translateX(18px);}
    .notif-list{display:flex;flex-direction:column;}
    .notif-item{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);}
    .notif-item:last-child{border-bottom:none;}
    .notif-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);margin-top:5px;flex-shrink:0;}
    .notif-dot.read{background:var(--border);}
    .notif-text{flex:1;}
    .notif-title{font-size:13px;font-weight:600;margin-bottom:2px;}
    .notif-body{font-size:12px;color:var(--muted);line-height:1.5;}
    .notif-time{font-size:11px;color:var(--muted);margin-top:4px;}
    .empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
    .empty-state svg{width:36px;height:36px;stroke:var(--border);fill:none;stroke-width:1.5;margin:0 auto 14px;display:block;}
    .mark-read-btn{padding:5px 12px;background:var(--off);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--navy);}
    .mark-read-btn:hover{background:var(--border);}
    @media(max-width:768px){
      .sidebar{position:relative;width:100%;height:auto;flex-direction:row;border-right:none;border-bottom:1px solid var(--border);}
      .slogo{padding:12px 14px;border-bottom:none;}
      .snav{flex-direction:row;padding:8px;overflow-x:auto;flex-wrap:nowrap;}
      .ni{white-space:nowrap;font-size:12px;padding:7px 10px;}
      .sbottom{display:none;}
      .main{margin-left:0;}
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="slogo"><a href="/"><img src="img/logo.png" alt="Grassion" /></a></div>
  <nav class="snav">
    <a href="dashboard.html" class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
    <a href="repositories.html" class="ni"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Repositories</a>
    <a href="pr-events.html" class="ni"><svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>PR Events</a>
    <a href="notifications.html" class="ni active"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</a>
    <a href="settings.html" class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sbottom">
    <div class="ucard" id="upgrade-card">
      <p>You're on</p><strong>Free Plan</strong>
      <a href="upgrade.html" class="ubtn">Upgrade to Pro →</a>
    </div>
    <a href="#" id="sidebar-signout" style="display:flex;align-items:center;gap:8px;padding:10px 11px;margin-top:8px;border-radius:7px;text-decoration:none;color:#c62828;font-size:13px;font-weight:600;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
</aside>
<div class="main">
  <header class="topbar">
    <span class="ptitle">Notifications</span>
    <div class="tright">
      <span class="pbadge" id="plan-badge">Free</span>
      <span class="uname" id="user-name">—</span>
    </div>
  </header>
  <div class="content">
    <h1>Notifications</h1>
    <p class="sub">Stay updated on PR reviews, security alerts, and team activity.</p>

    <!-- Recent notifications -->
    <div class="section-card">
      <div class="section-head">
        <div><h2>Recent</h2><p>Your latest activity and alerts</p></div>
        <button class="mark-read-btn" id="mark-all-btn">Mark all as read</button>
      </div>
      <div id="notif-list">
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <p>No notifications yet.<br/>They'll appear here when PRs are reviewed or alerts fire.</p>
        </div>
      </div>
    </div>

    <!-- Notification preferences -->
    <div class="section-card">
      <div class="section-head">
        <div><h2>Email Preferences</h2><p>Choose what you want to be notified about</p></div>
      </div>
      <div class="notif-row">
        <div><div class="notif-label">PR review completed</div><div class="notif-desc">Get notified when Grassion finishes reviewing a pull request</div></div>
        <label class="toggle"><input type="checkbox" checked id="pref-pr-review"><span class="slider"></span></label>
      </div>
      <div class="notif-row">
        <div><div class="notif-label">High risk PR detected</div><div class="notif-desc">Immediate alert when a PR is flagged as high risk</div></div>
        <label class="toggle"><input type="checkbox" checked id="pref-high-risk"><span class="slider"></span></label>
      </div>
      <div class="notif-row">
        <div><div class="notif-label">PR blocked from merging</div><div class="notif-desc">Alert when auto-block prevents a dangerous merge</div></div>
        <label class="toggle"><input type="checkbox" checked id="pref-blocked"><span class="slider"></span></label>
      </div>
      <div class="notif-row">
        <div><div class="notif-label">Weekly digest</div><div class="notif-desc">Summary of all PR activity every Monday morning</div></div>
        <label class="toggle"><input type="checkbox" id="pref-digest"><span class="slider"></span></label>
      </div>
      <div class="notif-row">
        <div><div class="notif-label">Billing & plan updates</div><div class="notif-desc">Receipts, plan changes, and renewal reminders</div></div>
        <label class="toggle"><input type="checkbox" checked id="pref-billing"><span class="slider"></span></label>
      </div>
      <div style="padding:14px 20px;border-top:1px solid var(--border);">
        <button onclick="savePreferences()" style="padding:9px 20px;background:var(--navy);color:white;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);">Save preferences</button>
      </div>
    </div>
  </div>
</div>
<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token) { window.location.replace('login.html'); }
  if (user) {
    document.getElementById('user-name').textContent = user.name || user.email;
    if (user.plan && user.plan !== 'free') {
      document.getElementById('plan-badge').textContent = user.plan.charAt(0).toUpperCase() + user.plan.slice(1);
      document.getElementById('upgrade-card').style.display = 'none';
    }
  }
  document.getElementById('sign-out-btn').addEventListener('click', e => { e.preventDefault(); localStorage.clear(); window.location.href = 'login.html'; });

  // Load notifications from API
  async function loadNotifications() {
    try {
      const r = await fetch('/api/dashboard/notifications', { headers: { Authorization: `Bearer ${token}` } });
      if (!r.ok) return;
      const items = await r.json();
      if (!items || !items.length) return;
      const list = document.getElementById('notif-list');
      list.innerHTML = items.map(n => `
        <div class="notif-item">
          <div class="notif-dot ${n.read ? 'read' : ''}"></div>
          <div class="notif-text">
            <div class="notif-title">${n.title || 'Notification'}</div>
            <div class="notif-body">${n.body || n.message || ''}</div>
            <div class="notif-time">${n.created_at ? new Date(n.created_at).toLocaleString('en-IN') : ''}</div>
          </div>
        </div>`).join('');
    } catch (e) { /* keep empty state */ }
  }

  document.getElementById('mark-all-btn').addEventListener('click', async () => {
    try {
      await fetch('/api/dashboard/notifications/read', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      document.querySelectorAll('.notif-dot').forEach(d => d.classList.add('read'));
    } catch (e) {}
  });

  function savePreferences() {
    const prefs = {
      pr_review: document.getElementById('pref-pr-review').checked,
      high_risk: document.getElementById('pref-high-risk').checked,
      blocked: document.getElementById('pref-blocked').checked,
      digest: document.getElementById('pref-digest').checked,
      billing: document.getElementById('pref-billing').checked
    };
    localStorage.setItem('notif_prefs', JSON.stringify(prefs));
    alert('Preferences saved!');
  }

  // Restore saved prefs
  const saved = JSON.parse(localStorage.getItem('notif_prefs') || 'null');
  if (saved) {
    if (saved.pr_review !== undefined) document.getElementById('pref-pr-review').checked = saved.pr_review;
    if (saved.high_risk !== undefined) document.getElementById('pref-high-risk').checked = saved.high_risk;
    if (saved.blocked !== undefined) document.getElementById('pref-blocked').checked = saved.blocked;
    if (saved.digest !== undefined) document.getElementById('pref-digest').checked = saved.digest;
    if (saved.billing !== undefined) document.getElementById('pref-billing').checked = saved.billing;
  }

  loadNotifications();

  var so=document.getElementById('sidebar-signout');if(so)so.addEventListener('click',function(e){e.preventDefault();localStorage.clear();window.location.href='login.html';});
</script>
</body>
</html>
