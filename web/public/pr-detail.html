<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Detail — Grassion</title>
  <link rel="icon" type="image/png" href="img/logo-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#1a2b3c;--navy-mid:#243447;--teal:#2a7fa5;--tl:#3a9bc4;--off:#f4f7fa;--border:rgba(42,127,165,0.15);--muted:#6b8099;--font:'Inter',sans-serif;--sw:220px;}
    *{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;}
    body{font-family:var(--font);background:var(--off);color:var(--navy);display:flex;min-height:100vh;overflow-x:hidden;overflow-y:auto;}
    .sidebar{width:var(--sw);background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;}
    .slogo{padding:22px 18px 18px;border-bottom:1px solid var(--border);}.slogo img{height:28px;}
    .snav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;}
    .ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;transition:background .15s,color .15s;}
    .ni svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}
    .ni:hover{background:var(--off);color:var(--navy);}.ni.active{background:rgba(42,127,165,.1);color:var(--teal);}
    .sbottom{padding:14px 10px;border-top:1px solid var(--border);}
    .ucard{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:9px;padding:14px;color:white;}
    .ucard p{font-size:11px;opacity:.6;margin-bottom:3px;}.ucard strong{font-size:12px;font-weight:600;display:block;margin-bottom:10px;}
    .ubtn{display:block;text-align:center;padding:7px;background:var(--teal);color:white;border-radius:5px;font-size:11px;font-weight:600;text-decoration:none;}
    .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-y:auto;}
    .topbar{background:white;border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .back-btn{font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;}
    .back-btn:hover{color:var(--teal);}
    .ptitle{font-size:15px;font-weight:700;}.tright{display:flex;align-items:center;gap:14px;}
    .pbadge{padding:3px 9px;background:var(--off);border:1px solid var(--border);border-radius:100px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;}
    .pbadge.pro{background:rgba(42,127,165,.1);color:var(--teal);}
    .uname{font-size:13px;font-weight:500;}
    .content{padding:28px;flex:1;max-width:900px;}
    .pr-header{background:white;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;}
    .pr-num{font-size:11px;color:var(--teal);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
    .pr-title{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px;}
    .pr-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .pr-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
    .pr-meta-item svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;}
    .risk-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;}
    .risk-low{background:#e8f5e9;color:#2e7d32;}.risk-medium{background:#fff8e1;color:#f57f17;}.risk-high{background:#ffebee;color:#c62828;}
    .blocked-banner{background:#ffebee;border:1px solid #ffcdd2;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:13px;color:#c62828;font-weight:600;}
    .safe-banner{background:#e8f5e9;border:1px solid #c8e6c9;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:13px;color:#2e7d32;font-weight:600;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
    .card{background:white;border:1px solid var(--border);border-radius:10px;padding:20px;}
    .card-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
    .card-title svg{width:14px;height:14px;stroke:var(--teal);fill:none;stroke-width:1.8;}
    .ai-summary{font-size:13px;line-height:1.75;color:var(--navy-mid);}
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
    .stat-row:last-child{border-bottom:none;}
    .stat-label{color:var(--muted);}
    .stat-value{font-weight:600;}
    .risk-bar-wrap{margin:14px 0;}
    .risk-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;}
    .risk-bar{height:8px;background:var(--off);border-radius:100px;overflow:hidden;}
    .risk-bar-fill{height:100%;border-radius:100px;transition:width 1s ease-out;}
    .bar-low{background:linear-gradient(90deg,#48bb78,#68d391);}
    .bar-medium{background:linear-gradient(90deg,#ecc94b,#f6e05e);}
    .bar-high{background:linear-gradient(90deg,#f56565,#fc8181);}
    .pr-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--navy);color:white;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;margin-top:14px;transition:background .2s;}
    .pr-link:hover{background:var(--teal);}
    .pr-link svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}
    .loading{text-align:center;padding:60px;color:var(--muted);font-size:13px;}
    #toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:500;display:none;z-index:9999;}
    #toast.success{background:var(--navy);color:white;}#toast.error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2;}
    @media(max-width:768px){.sidebar{position:relative;width:100%;height:auto;flex-direction:row;border-right:none;border-bottom:1px solid var(--border);}.slogo{padding:12px 14px;border-bottom:none;}.snav{flex-direction:row;padding:8px;overflow-x:auto;flex-wrap:nowrap;}.ni{white-space:nowrap;font-size:12px;padding:7px 10px;}.sbottom{display:none;}.main{margin-left:0;}.grid-2{grid-template-columns:1fr;}.content{max-width:100%;}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="slogo"><a href="/"><img src="img/logo.png" alt="Grassion" /></a></div>
  <nav class="snav">
    <a href="dashboard.html" class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
    <a href="repositories.html" class="ni"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Repositories</a>
    <a href="pr-events.html" class="ni active"><svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>PR Events</a>
    <a href="impact.html" class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Impact Intel</a>
    <a href="incident.html" class="ni"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Incidents</a>
    <a href="notifications.html" class="ni"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Notifications</a>
    <a href="settings.html" class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sbottom">
    <div class="ucard" id="upgrade-card"><p>You're on</p><strong id="plan-label">Free Plan</strong><a href="upgrade.html" class="ubtn">Upgrade →</a></div>
    <a href="#" id="sidebar-signout" style="display:flex;align-items:center;gap:8px;padding:10px 11px;margin-top:8px;border-radius:7px;text-decoration:none;color:#c62828;font-size:13px;font-weight:600;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out
    </a>
  </div>
</aside>
<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <a href="pr-events.html" class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
      <span class="ptitle" id="topbar-title">PR Detail</span>
    </div>
    <div class="tright">
      <span class="pbadge" id="plan-badge">Free</span>
      <span class="uname" id="user-name">—</span>
    </div>
  </header>
  <div class="content">
    <div id="pr-content"><div class="loading">Loading PR details…</div></div>
  </div>
</div>
<div id="toast"></div>
<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token) { window.location.replace('login.html'); }
  if (user) {
    document.getElementById('user-name').textContent = user.name || user.email;
    const pl = document.getElementById('plan-label'); if(pl) pl.textContent = (user.plan||'free').charAt(0).toUpperCase()+(user.plan||'free').slice(1)+' Plan';
    if (user.plan && user.plan !== 'free') { const b=document.getElementById('plan-badge');b.textContent=user.plan.charAt(0).toUpperCase()+user.plan.slice(1);b.classList.add('pro');document.getElementById('upgrade-card').style.display='none'; }
  }
  document.getElementById('sidebar-signout').addEventListener('click', e => { e.preventDefault(); localStorage.clear(); window.location.href='login.html'; });

  const params = new URLSearchParams(window.location.search);
  const prId = params.get('id');

  async function loadPR() {
    const container = document.getElementById('pr-content');
    if (!prId) { container.innerHTML = '<div class="loading">No PR ID specified.</div>'; return; }
    try {
      const r = await fetch('/api/github/events', { headers: { Authorization: `Bearer ${token}` } });
      if (!r.ok) throw new Error('Failed to load');
      const events = await r.json();
      const ev = events.find(e => String(e.id) === String(prId));
      if (!ev) { container.innerHTML = '<div class="loading">PR not found.</div>'; return; }

      const risk = ev.risk_level || 'low';
      const riskScore = risk === 'high' ? 85 : risk === 'medium' ? 50 : 15;
      const riskClass = `risk-${risk}`;
      const blocked = ev.blocked;

      document.getElementById('topbar-title').textContent = `PR #${ev.pr_number}`;

      const bannerHtml = blocked
        ? `<div class="blocked-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>This PR was blocked from merging — ${ev.risk_reason || 'High risk detected'}</div>`
        : `<div class="safe-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>This PR was approved as safe to merge</div>`;

      container.innerHTML = `
        ${bannerHtml}
        <div class="pr-header">
          <div class="pr-num">${ev.github_repo || ''} · PR #${ev.pr_number}</div>
          <div class="pr-title">${ev.pr_title || 'Untitled PR'}</div>
          <div class="pr-meta">
            <div class="pr-meta-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${ev.pr_author || 'unknown'}</div>
            <div class="pr-meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ev.created_at ? new Date(ev.created_at).toLocaleString('en-IN') : '—'}</div>
            <div class="pr-meta-item"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>${ev.action || 'opened'}</div>
            <span class="risk-badge ${riskClass}">${risk} risk</span>
          </div>
          ${ev.pr_url ? `<a href="${ev.pr_url}" target="_blank" class="pr-link"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View on GitHub</a>` : ''}
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>AI Risk Analysis</div>
            <div class="ai-summary">${ev.ai_summary || ev.risk_reason || 'No AI summary available for this PR. Upgrade to Pro for full AI analysis.'}</div>
          </div>
          <div class="card">
            <div class="card-title"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Risk Breakdown</div>
            <div class="risk-bar-wrap">
              <div class="risk-bar-label"><span>Risk Score</span><span>${riskScore}/100</span></div>
              <div class="risk-bar"><div class="risk-bar-fill bar-${risk}" style="width:0%" id="risk-fill"></div></div>
            </div>
            <div class="stat-row"><span class="stat-label">Risk Level</span><span class="stat-value risk-badge ${riskClass}">${risk}</span></div>
            <div class="stat-row"><span class="stat-label">Reason</span><span class="stat-value" style="text-align:right;max-width:180px;">${ev.risk_reason || '—'}</span></div>
            <div class="stat-row"><span class="stat-label">Action</span><span class="stat-value">${ev.action || '—'}</span></div>
            <div class="stat-row"><span class="stat-label">Blocked</span><span class="stat-value" style="color:${blocked?'#c62828':'#2e7d32'}">${blocked ? 'Yes' : 'No'}</span></div>
          </div>
        </div>`;

      setTimeout(() => {
        const fill = document.getElementById('risk-fill');
        if (fill) fill.style.width = riskScore + '%';
      }, 100);

    } catch(e) { document.getElementById('pr-content').innerHTML = `<div class="loading">Error: ${e.message}</div>`; }
  }

  loadPR();
</script>
</body>
</html>
