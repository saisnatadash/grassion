<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Grassion</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <canvas id="water-canvas"></canvas>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><div class="nav-logo-icon">🛡</div>Grass<span>ion</span></a>
    <ul class="nav-links">
      <li><a href="/#features">Features</a></li>
      <li><a href="/#pricing">Pricing</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/contact.html" class="active">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle dark mode"><span class="theme-icon">🌙</span></button>
      <a href="/" class="btn btn-primary btn-sm">Get started</a>
    </div>
  </div>
</nav>

<main style="padding-top: var(--nav-h);">
  <section style="padding: 100px 0;">
    <div class="container">
      <div style="max-width:640px; margin: 0 auto;">
        <div class="label-tag reveal">📬 Get in touch</div>
        <h1 class="display-2 reveal reveal-delay-1" style="margin-bottom:12px;">Talk to us</h1>
        <p class="reveal reveal-delay-2" style="color:var(--text-2);margin-bottom:48px;font-size:1rem;line-height:1.7;">Have a question, want a demo, or need enterprise pricing? We reply within 24 hours.</p>

        <div class="glass reveal reveal-delay-2" style="padding:40px;">
          <form id="form-contact" style="display:flex;flex-direction:column;gap:20px;">
            <div class="grid-2">
              <div class="input-wrap">
                <label class="input-label">Name</label>
                <input type="text" name="name" placeholder="Your name" required />
              </div>
              <div class="input-wrap">
                <label class="input-label">Email</label>
                <input type="email" name="email" placeholder="you@company.com" required />
              </div>
            </div>
            <div class="input-wrap">
              <label class="input-label">Subject</label>
              <input type="text" name="subject" placeholder="What's on your mind?" />
            </div>
            <div class="input-wrap">
              <label class="input-label">Message</label>
              <textarea name="message" placeholder="Tell us more..." required rows="5"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Send message →</button>
          </form>
        </div>

        <div class="grid-2 reveal" style="margin-top:32px;">
          <div class="glass" style="padding:24px;">
            <div style="font-size:1.5rem;margin-bottom:10px;">✉️</div>
            <div style="font-size:0.88rem;font-weight:600;margin-bottom:4px;">Email</div>
            <a href="mailto:info@grassion.com" style="font-size:0.85rem;color:var(--accent);text-decoration:none;">info@grassion.com</a>
          </div>
          <div class="glass" style="padding:24px;">
            <div style="font-size:1.5rem;margin-bottom:10px;">⚡</div>
            <div style="font-size:0.88rem;font-weight:600;margin-bottom:4px;">Response time</div>
            <div style="font-size:0.85rem;color:var(--text-2);">Within 24 hours</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <span>© 2025 Grassion.</span>
      <a href="/" style="color:var(--accent);">← Back to home</a>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  bindForm('form-contact', async fd => {
    await API.sendContact(fd.get('name'), fd.get('email'), fd.get('message'), fd.get('subject'));
    Toast.show('Message sent! We\'ll reply within 24 hours.', 'success');
    document.getElementById('form-contact').reset();
  });
});
</script>
</body>
</html>
